<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>港の図書室</title>
  <style>
    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --primary: #2c4a3e;
      --accent: #6b8f71;
      --text: #2a2a2a;
      --muted: #7a7a7a;
      --border: #e0ddd8;
      --badge-available: #2c6b3a;
      --badge-borrowed: #b85c00;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }

    /* ヘッダー */
    header {
      background: var(--primary);
      color: white;
      padding: 20px 16px 24px;
      text-align: center;
    }
    header h1 { font-size: 1.5rem; letter-spacing: 0.1em; margin-bottom: 8px; }
    header .curator-note {
      font-size: 0.82rem;
      opacity: 0.85;
      line-height: 1.6;
      max-width: 420px;
      margin: 0 auto;
    }

    /* 検索・フィルター */
    .controls {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .controls input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      background: var(--bg);
    }
    .controls select {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.85rem;
      background: var(--bg);
    }

    /* 本一覧 */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      padding: 16px;
      max-width: 900px;
      margin: 0 auto;
    }
    .book-card {
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }
    .book-card:active { box-shadow: 0 2px 12px rgba(0,0,0,0.12); }
    .book-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; }
    .book-cover-placeholder { color: var(--muted); }
    .book-info { padding: 10px; }
    .book-title {
      font-size: 0.85rem;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-author { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 20px;
      font-weight: bold;
    }
    .badge-available { background: #e6f4ea; color: var(--badge-available); }
    .badge-borrowed { background: #fff0e0; color: var(--badge-borrowed); }
    .book-rating { font-size: 0.75rem; color: #c8a400; margin-top: 4px; }

    /* ローディング・空状態 */
    .loading, .empty {
      text-align: center;
      padding: 60px 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* モーダルオーバーレイ */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
    }
    .overlay.open { display: flex; }

    /* ボトムシート */
    .sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px 20px 40px;
    }
    .sheet-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .sheet h2 { font-size: 1.1rem; margin-bottom: 4px; }
    .sheet .book-meta { font-size: 0.82rem; color: var(--muted); margin-bottom: 16px; }
    .sheet-comment {
      background: var(--bg);
      border-left: 3px solid var(--accent);
      padding: 10px 12px;
      border-radius: 0 8px 8px 0;
      font-size: 0.83rem;
      line-height: 1.6;
      margin-bottom: 16px;
      color: var(--text);
    }
    .sheet-comment .curator-label {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: bold;
      margin-bottom: 4px;
    }

    /* アクションボタン */
    .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-borrow { background: var(--primary); color: white; }
    .btn-return { background: #e8f4e8; color: var(--badge-available); border: 1px solid var(--accent); }
    .btn-review { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-cancel { background: transparent; color: var(--muted); border: none; font-size: 0.9rem; padding: 10px; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    /* フォーム */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: var(--bg);
    }
    .form-group textarea { height: 90px; resize: vertical; font-family: inherit; }
    .star-select { display: flex; gap: 8px; }
    .star-btn {
      font-size: 1.5rem;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      opacity: 0.3;
      transition: opacity 0.1s, transform 0.1s;
    }
    .star-btn.active { opacity: 1; transform: scale(1.1); }

    /* 返却確認 */
    .return-info {
      background: var(--bg);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 0.87rem;
      line-height: 1.7;
    }

    /* メッセージ */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2a2a;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>📚 港の図書室</h1>
  <p class="curator-note">
    ゲストハウスの本棚から、地域の皆さんへ。<br>
    気になった本を自由にお借りください。（管理人：太郎）
  </p>
</header>

<div class="controls">
  <input type="search" id="searchInput" placeholder="書名・著者で検索..." oninput="filterBooks()" />
  <select id="categoryFilter" onchange="filterBooks()">
    <option value="">すべて</option>
  </select>
</div>

<div class="book-grid" id="bookGrid">
  <div class="loading">読み込み中...</div>
</div>

<!-- 本詳細・操作ボタム -->
<div class="overlay" id="overlay" onclick="closeSheet(event)">
  <div class="sheet" id="sheet">
    <div class="sheet-handle"></div>

    <!-- 本情報 -->
    <div id="sheetBookInfo"></div>

    <!-- アクションエリア（切り替え） -->
    <div id="sheetAction"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = ''; // Vercel上では同一オリジンなので空でOK
  let allBooks = [];
  let selectedBook = null;
  let selectedRating = 0;

  // ── 起動時に本一覧を取得 ──
  async function loadBooks() {
    try {
      const res = await fetch(`${API}/api/books`);
      allBooks = await res.json();
      renderBooks(allBooks);
      buildCategoryFilter(allBooks);
    } catch (e) {
      document.getElementById('bookGrid').innerHTML =
        '<div class="empty">データを取得できませんでした。</div>';
    }
  }

  function buildCategoryFilter(books) {
    const cats = [...new Set(books.map(b => b.category).filter(Boolean))];
    const sel = document.getElementById('categoryFilter');
    cats.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      sel.appendChild(opt);
    });
  }

  function filterBooks() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('categoryFilter').value;
    const filtered = allBooks.filter(b => {
      const matchText = !q || b.title.toLowerCase().includes(q) || (b.author||'').toLowerCase().includes(q);
      const matchCat = !cat || b.category === cat;
      return matchText && matchCat;
    });
    renderBooks(filtered);
  }

  function renderBooks(books) {
    const grid = document.getElementById('bookGrid');
    if (books.length === 0) {
      grid.innerHTML = '<div class="empty">該当する本がありません。</div>';
      return;
    }
    grid.innerHTML = books.map(book => `
      <div class="book-card" onclick="openSheet('${book.id}')">
        <div class="book-cover">
          ${book.cover
            ? `<img src="${book.cover}" alt="${book.title}" loading="lazy" />`
            : `<span class="book-cover-placeholder">📖</span>`}
        </div>
        <div class="book-info">
          <div class="book-title">${esc(book.title)}</div>
          <div class="book-author">${esc(book.author)}</div>
          <span class="badge ${book.status === '貸出可能' ? 'badge-available' : 'badge-borrowed'}">
            ${book.status === '貸出可能' ? '貸出可能' : '貸出中'}
          </span>
          ${book.avgRating ? `<div class="book-rating">${'★'.repeat(Math.round(book.avgRating))} ${book.avgRating.toFixed(1)}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  // ── ボトムシートを開く ──
  function openSheet(bookId) {
    selectedBook = allBooks.find(b => b.id === bookId);
    if (!selectedBook) return;

    document.getElementById('sheetBookInfo').innerHTML = `
      <h2>${esc(selectedBook.title)}</h2>
      <div class="book-meta">${esc(selectedBook.author)}${selectedBook.category ? ' ／ ' + esc(selectedBook.category) : ''}</div>
      ${selectedBook.comment ? `
        <div class="sheet-comment">
          <div class="curator-label">📝 太郎のひとこと</div>
          ${esc(selectedBook.comment)}
        </div>` : ''}
    `;

    showActionMenu();
    document.getElementById('overlay').classList.add('open');
  }

  function showActionMenu() {
    const b = selectedBook;
    document.getElementById('sheetAction').innerHTML = `
      <div class="action-buttons">
        ${b.status === '貸出可能'
          ? `<button class="btn btn-borrow" onclick="showBorrowForm()">📖 この本を借りる</button>`
          : `<div class="return-info">現在 <strong>${esc(b.borrower)}</strong> さんが借りています。</div>
             <button class="btn btn-return" onclick="showReturnForm()">🔄 返却する</button>`}
        <button class="btn btn-review" onclick="showReviewForm()">⭐ レビューを書く</button>
        <button class="btn btn-cancel" onclick="closeSheet()">閉じる</button>
      </div>
    `;
  }

  // ── 貸出フォーム ──
  function showBorrowForm() {
    document.getElementById('sheetAction').innerHTML = `
      <div class="form-group">
        <label>お名前（ニックネームでもOK）</label>
        <input type="text" id="borrowerName" placeholder="例：田中、旅人A" />
      </div>
      <div class="action-buttons">
        <button class="btn btn-borrow" id="borrowSubmitBtn" onclick="submitBorrow()">借りる</button>
        <button class="btn btn-cancel" onclick="showActionMenu()">← 戻る</button>
      </div>
    `;
  }

  async function submitBorrow() {
    const name = document.getElementById('borrowerName').value.trim();
    if (!name) { showToast('お名前を入力してください'); return; }

    const btn = document.getElementById('borrowSubmitBtn');
    btn.disabled = true;
    btn.textContent = '処理中...';

    try {
      const res = await fetch(`${API}/api/borrow`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookId: selectedBook.id, borrowerName: name }),
      });
      if (!res.ok) throw new Error();
      showToast('✅ 貸出を記録しました。どうぞお楽しみください！');
      closeSheet();
      await loadBooks(); // 一覧を再取得してステータスを更新
    } catch {
      showToast('❌ エラーが発生しました。もう一度お試しください。');
      btn.disabled = false;
      btn.textContent = '借りる';
    }
  }

  // ── 返却フォーム ──
  function showReturnForm() {
    document.getElementById('sheetAction').innerHTML = `
      <div class="return-info">
        「${esc(selectedBook.title)}」を返却します。<br>
        ありがとうございました！
      </div>
      <div class="action-buttons">
        <button class="btn btn-return" id="returnSubmitBtn" onclick="submitReturn()">返却する</button>
        <button class="btn btn-cancel" onclick="showActionMenu()">← 戻る</button>
      </div>
    `;
  }

  async function submitReturn() {
    const btn = document.getElementById('returnSubmitBtn');
    btn.disabled = true;
    btn.textContent = '処理中...';

    try {
      const res = await fetch(`${API}/api/return`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookId: selectedBook.id }),
      });
      if (!res.ok) throw new Error();
      showToast('✅ 返却を記録しました。ありがとうございました！');
      closeSheet();
      await loadBooks();
    } catch {
      showToast('❌ エラーが発生しました。もう一度お試しください。');
      btn.disabled = false;
      btn.textContent = '返却する';
    }
  }

  // ── レビューフォーム ──
  function showReviewForm() {
    selectedRating = 0;
    document.getElementById('sheetAction').innerHTML = `
      <div class="form-group">
        <label>評価</label>
        <div class="star-select">
          ${[1,2,3,4,5].map(n => `<button class="star-btn" id="star${n}" onclick="selectRating(${n})">★</button>`).join('')}
        </div>
      </div>
      <div class="form-group">
        <label>お名前</label>
        <input type="text" id="reviewerName" placeholder="ニックネームでもOK" />
      </div>
      <div class="form-group">
        <label>感想</label>
        <textarea id="reviewComment" placeholder="読んでみての感想をどうぞ..."></textarea>
      </div>
      <div class="action-buttons">
        <button class="btn btn-borrow" id="reviewSubmitBtn" onclick="submitReview()">レビューを投稿</button>
        <button class="btn btn-cancel" onclick="showActionMenu()">← 戻る</button>
      </div>
    `;
  }

  function selectRating(n) {
    selectedRating = n;
    for (let i = 1; i <= 5; i++) {
      const el = document.getElementById(`star${i}`);
      if (el) el.classList.toggle('active', i <= n);
    }
  }

  async function submitReview() {
    const name = document.getElementById('reviewerName').value.trim();
    const comment = document.getElementById('reviewComment').value.trim();
    if (!name) { showToast('お名前を入力してください'); return; }
    if (!selectedRating) { showToast('評価（★）を選択してください'); return; }

    const btn = document.getElementById('reviewSubmitBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    try {
      const res = await fetch(`${API}/api/review`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          bookId: selectedBook.id,
          reviewerName: name,
          rating: selectedRating,
          comment,
        }),
      });
      if (!res.ok) throw new Error();
      showToast('✅ レビューを投稿しました！ありがとうございます。');
      closeSheet();
    } catch {
      showToast('❌ エラーが発生しました。もう一度お試しください。');
      btn.disabled = false;
      btn.textContent = 'レビューを投稿';
    }
  }

  // ── ユーティリティ ──
  function closeSheet(e) {
    if (e && e.target !== document.getElementById('overlay')) return;
    document.getElementById('overlay').classList.remove('open');
    selectedBook = null;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadBooks();
</script>
</body>
</html>
